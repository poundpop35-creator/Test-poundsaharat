<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ตารางรถรับ (โรงแรม -> กรมวิทย์)</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* --- CSS Styles --- */
        :root {
            --primary-color: #0056b3;      /* สีหลัก (น้ำเงิน) */
            --secondary-color: #00a8cc;    /* สีรอง (ฟ้าสดใส) */
            --bg-color: #f4f6f9;           /* สีพื้นหลัง */
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-sub: #666666;
            --alert-color: #d32f2f;
            --shadow: 0 4px 10px rgba(0,0,0,0.08);
        }

        body {
            font-family: 'Sarabun', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            line-height: 1.4;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            color: var(--primary-color);
            text-align: center;
            margin-bottom: 5px;
            font-weight: 800;
            font-size: 26px;
        }

        .subtitle {
            text-align: center;
            color: var(--text-sub);
            margin-bottom: 25px;
            font-size: 16px;
        }

        /* --- Summary --- */
        .summary-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .summary-badge {
            background: #fff;
            padding: 8px 16px;
            border-radius: 30px;
            box-shadow: var(--shadow);
            font-weight: 600;
            color: var(--primary-color);
            border: 1px solid #e0e0e0;
            font-size: 14px;
        }

        /* --- Controls --- */
        .controls-container {
            background: #fff;
            padding: 20px;
            border-radius: 16px;
            box-shadow: var(--shadow);
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 25px;
        }

        .search-box { flex: 2; min-width: 250px; }
        .filter-box { flex: 1; min-width: 200px; }

        .form-control {
            width: 100%;
            padding: 12px 15px;
            font-size: 16px;
            border: 1px solid #dfe1e5;
            border-radius: 8px;
            font-family: 'Sarabun', sans-serif;
            outline: none;
            transition: all 0.2s;
            background-color: #f9fafb;
        }

        .form-control:focus {
            border-color: var(--secondary-color);
            box-shadow: 0 0 0 3px rgba(0, 168, 204, 0.15);
            background-color: #fff;
        }

        /* --- Cards --- */
        .card-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .guest-card {
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: var(--shadow);
            overflow: hidden;
            transition: transform 0.2s;
            display: flex;
            flex-direction: column;
            border: 1px solid #eee;
        }

        .guest-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.12);
        }

        /* Header: โรงแรม */
        .card-header {
            padding: 15px 20px;
            color: white;
            font-weight: 700;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .hotel-icon { margin-right: 8px; font-size: 18px; }
        .seq-badge {
            background: rgba(0,0,0,0.2);
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 12px;
        }

        /* Body */
        .card-body {
            padding: 20px;
            flex-grow: 1;
        }

        .user-name {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 4px;
        }

        .user-org {
            font-size: 14px;
            color: var(--text-sub);
            margin-bottom: 15px;
            display: flex;
            align-items: flex-start;
            gap: 6px;
        }

        /* Info Grid */
        .info-box {
            background-color: #f0f8ff;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px dashed #b3d7ff;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        .info-row:last-child { margin-bottom: 0; }

        .info-label { font-size: 13px; color: #666; }
        .info-value { font-size: 15px; font-weight: 700; color: #0056b3; text-align: right; }

        .time-highlight {
            color: #d63384; /* ชมพูเข้ม */
            font-size: 18px;
            font-weight: 800;
        }

        /* Coordinator Section */
        .contact-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #eee;
        }

        .contact-item {
            font-size: 12px;
        }
        
        .contact-name { font-weight: 600; color: #333; display: block; margin-bottom: 2px;}
        .contact-tel { 
            color: var(--secondary-color); 
            text-decoration: none; 
            font-weight: 700; 
            display: inline-block;
            padding: 2px 6px;
            border: 1px solid var(--secondary-color);
            border-radius: 4px;
            margin-top: 2px;
            transition: all 0.2s;
        }
        .contact-tel:hover {
            background-color: var(--secondary-color);
            color: #fff;
        }

        /* Footer: Remark */
        .card-footer {
            background-color: #fff5f5;
            padding: 12px 20px;
            font-size: 15px;
            color: var(--alert-color);
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            border-top: 1px solid #ffdede;
        }

        .no-result {
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px;
            color: #999;
            background: #fff;
            border-radius: 12px;
            display: none;
        }

    </style>
</head>

        // --- 2. ตัวแปร DOM ---
        const cardContainer = document.getElementById('cardContainer');
        const searchInput = document.getElementById('searchInput');
        const hotelFilter = document.getElementById('hotelFilter');
        const carFilter = document.getElementById('carFilter');
        const summarySection = document.getElementById('summarySection');
        const noResultMsg = document.getElementById('noResult');

        // --- 3. ฟังก์ชันจัดเตรียม Dropdown Filters ---
        function populateFilters() {
            // Filter: โรงแรม
            const hotels = [...new Set(rawData.map(item => item["โรงแรม"]))].sort();
            hotels.forEach(h => {
                const option = document.createElement('option');
                option.value = h;
                option.textContent = h;
                hotelFilter.appendChild(option);
            });

            // Filter: รถ (ทะเบียน) - ใช้ Key ยาวๆ ตาม JSON
            const carKey = "ทะเบียนรถรับลส่ง\nที่พัก - กรมวิทย์";
            const cars = [...new Set(rawData.map(item => item[carKey]))].sort();
            cars.forEach(c => {
                const option = document.createElement('option');
                option.value = c;
                option.textContent = c;
                carFilter.appendChild(option);
            });
        }

        // --- 4. ฟังก์ชันสรุปยอด (Summary) ---
        function renderSummary() {
            const totalPeople = rawData.length;
            const carKey = "ทะเบียนรถรับลส่ง\nที่พัก - กรมวิทย์";
            const uniqueCars = new Set(rawData.map(i => i[carKey])).size;
            
            summarySection.innerHTML = `
                <div class="summary-badge"><i class="fas fa-users"></i> ผู้เดินทาง ${totalPeople} ท่าน</div>
                <div class="summary-badge"><i class="fas fa-shuttle-van"></i> รถรับส่ง ${uniqueCars} กลุ่ม</div>
            `;
        }

        // --- 5. ฟังก์ชันแสดงผลการ์ด ---
        function renderCards(data) {
            cardContainer.innerHTML = '';
            
            if (data.length === 0) {
                noResultMsg.style.display = 'block';
                return;
            } else {
                noResultMsg.style.display = 'none';
            }

            data.forEach(item => {
                // ดึงข้อมูล
                const carKey = "ทะเบียนรถรับลส่ง\nที่พัก - กรมวิทย์";
                const timeKey = "เวลา\n(เริ่มออกจากโรงแรมตั้งแต่)";
                
                const hotel = item["โรงแรม"] || "ไม่ระบุ";
                const car = item[carKey] || "-";
                const time = item[timeKey] || "-";
                const name = item["ชื่อ - สกุล"] || "-";
                const org = item["หน่วยงาน"] || "-";
                const prov = item["จังหวัดที่ตั้งของหน่วยงาน"] || "-";
                const seq = item["ลำดับ"];
                const contactPersonHotel = item["ผู้ประสานงาน ที่ โรงแรม"] || "-";
                const contactTel = item["ติดต่อ"] || "";
                // แปลงเบอร์โทรให้กดโทรได้ (ลบวงเล็บ ขีด เว้นวรรค)
                const telLink = contactTel.replace(/[^0-9]/g, ''); 
                
                const contactPersonDept = item["ผู้ประสานงาน ที่ กรม"] || "-";
                const remark = item["หมายเหตุ"] || "-";

                // กำหนดธีมสีตามโรงแรม
                let headerColor = "#0056b3"; // Default Blue (Mida)
                if(hotel.includes("Grand Richmond")) {
                    headerColor = "#6f42c1"; // Purple for Richmond
                }

                const html = `
                    <div class="guest-card">
                        <div class="card-header" style="background-color: ${headerColor};">
                            <div>
                                <i class="fas fa-hotel hotel-icon"></i> 
                                ${hotel}
                            </div>
                            <span class="seq-badge">#${seq}</span>
                        </div>
                        
                        <div class="card-body">
                            <div class="user-name">${name}</div>
                            <div class="user-org">
                                <i class="fas fa-id-card-alt" style="margin-top:3px;"></i> 
                                <span>${org} (${prov})</span>
                            </div>

                            <div class="info-box">
                                <div class="info-row">
                                    <span class="info-label">รถรับส่ง</span>
                                    <span class="info-value">${car}</span>
                                </div>
                                <div class="info-row">
                                    <span class="info-label">เวลารถออก</span>
                                    <span class="info-value time-highlight">${time}</span>
                                </div>
                            </div>

                            <div class="contact-section">
                                <div class="contact-item">
                                    <span style="color:#888;">ผู้ประสานงานโรงแรม:</span>
                                    <span class="contact-name">${contactPersonHotel}</span>
                                    ${contactTel ? `<a href="tel:${telLink}" class="contact-tel"><i class="fas fa-phone-alt"></i> โทร ${contactTel}</a>` : ''}
                                </div>
                                <div class="contact-item">
                                    <span style="color:#888;">ผู้ประสานงานกรม:</span>
                                    <span class="contact-name">${contactPersonDept}</span>
                                </div>
                            </div>
                        </div>

                        <div class="card-footer">
                            <i class="fas fa-bullhorn"></i>
                            <span>${remark}</span>
                        </div>
                    </div>
                `;
                cardContainer.innerHTML += html;
            });
        }

        // --- 6. ฟังก์ชันกรองข้อมูล ---
        function filterData() {
            const searchText = searchInput.value.toLowerCase().trim();
            const selectedHotel = hotelFilter.value;
            const selectedCar = carFilter.value;
            const carKey = "ทะเบียนรถรับลส่ง\nที่พัก - กรมวิทย์";

            const filtered = rawData.filter(item => {
                const textMatch = 
                    (item["ชื่อ - สกุล"] || "").toLowerCase().includes(searchText) ||
                    (item["หน่วยงาน"] || "").toLowerCase().includes(searchText) ||
                    (item["จังหวัดที่ตั้งของหน่วยงาน"] || "").toLowerCase().includes(searchText);

                const hotelMatch = selectedHotel === "" || item["โรงแรม"] === selectedHotel;
                const carMatch = selectedCar === "" || item[carKey] === selectedCar;

                return textMatch && hotelMatch && carMatch;
            });
            
            renderCards(filtered);
        }

        // --- Init ---
        populateFilters();
        renderSummary();
        renderCards(rawData);

        // --- Events ---
        searchInput.addEventListener('keyup', filterData);
        hotelFilter.addEventListener('change', filterData);
        carFilter.addEventListener('change', filterData);

    </script>
</body>
</html>
